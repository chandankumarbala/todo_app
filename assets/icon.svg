<svg width="1024" height="1024" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="sq"><rect width="120" height="120" rx="26" ry="26"/></clipPath>
  </defs>

  <!-- ===== CORINTHIAN HELMET ===== -->
  <!-- Dome -->
  <path d="M44 52 Q44 40 60 38 Q76 40 76 52 L74 59 L46 59 Z" fill="#F1F5F9"/>
