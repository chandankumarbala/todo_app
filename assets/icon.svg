<svg width="1024" height="1024" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="120" height="120" rx="26" fill="#DC2626"/>

  <!-- Clock face -->
  <circle cx="60" cy="48" r="28" fill="white" opacity="0.95"/>
  <circle cx="60" cy="48" r="24" fill="#FEF2F2"/>

  <!-- Clock ticks at 12, 3, 6, 9 -->
  <line x1="60" y1="26" x2="60" y2="30" stroke="#DC2626" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="60" y1="66" x2="60" y2="70" stroke="#DC2626" stroke-width="2" stroke-linecap="round"/>
  <line x1="36" y1="48" x2="40" y2="48" stroke="#DC2626" stroke-width="2" stroke-linecap="round"/>
  <line x1="80" y1="48" x2="84" y2="48" stroke="#DC2626" stroke-width="2" stroke-linecap="round"/>

  <!-- Hour hand ~11 o'clock -->
  <line x1="60" y1="48" x2="50" y2="34" stroke="#991B1B" stroke-width="3" stroke-linecap="round"/>
  <!-- Minute hand ~58 min (near 12) -->
  <line x1="60" y1="48" x2="62" y2="26" stroke="#DC2626" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="60" cy="48" r="3" fill="#DC2626"/>

  <!-- Checklist row 1 — completed task -->
  <rect x="16" y="85" width="88" height="10" rx="5" fill="white" opacity="0.18"/>
  <polyline points="20,90 24,95 32,83" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <rect x="37" y="88" width="40" height="4" rx="2" fill="white" opacity="0.75"/>

  <!-- Checklist row 2 — pending task -->
  <rect x="16" y="100" width="88" height="10" rx="5" fill="white" opacity="0.10"/>
  <circle cx="24" cy="105" r="4" fill="none" stroke="white" stroke-width="2" opacity="0.5"/>
  <rect x="37" y="103" width="52" height="4" rx="2" fill="white" opacity="0.4"/>
</svg>
