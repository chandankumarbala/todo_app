  <path d="M46 59 L44 66 L51 66 L53 59 Z" fill="#E2E8F0"/>
  <path d="M74 59 L76 66 L69 66 L67 59 Z" fill="#E2E8F0"/>
  <!-- Nose guard -->
  <rect x="59" y="48" width="2" height="10" rx="1" fill="#CBD5E0"/>
  <!-- Eye holes -->
  <path d="M47 50 Q51 46 56 48 Q56 52 52 53 Q47 52 47 50Z" fill="#8B0000"/>
  <path d="M73 50 Q69 46 64 48 Q64 52 68 53 Q73 52 73 50Z" fill="#8B0000"/>
