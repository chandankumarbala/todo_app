  <rect x="84.5" y="30" width="3" height="1.2" rx="0.5" fill="#4A5568"/>
  <rect x="84.5" y="32.5" width="3" height="1.2" rx="0.5" fill="#4A5568"/>
  <rect x="84.5" y="35" width="3" height="1.2" rx="0.5" fill="#4A5568"/>
  <!-- Crossguard -->
  <rect x="80" y="26.5" width="12" height="2.5" rx="1.25" fill="#A0AEC0"/>
  <circle cx="80" cy="27.75" r="1.8" fill="#718096"/>
  <circle cx="92" cy="27.75" r="1.8" fill="#718096"/>
  <!-- Blade (pointing upward) -->
  <polygon points="86,7 88.5,26.5 83.5,26.5" fill="#F0F4F8"/>
  <!-- Fuller (blade ridge) -->
  <rect x="85.5" y="7" width="1" height="19.5" fill="#CBD5E0" opacity="0.6"/>

  <!-- ===== LEFT ARM + SHIELD ===== -->
  <!-- Upper arm -->
  <path d="M46 66 Q38 62 34 70 Q30 80 32 92 L36 92 Q34 82 37 74 Q40 68 46 68 Z" fill="#F1F5F9"/>
