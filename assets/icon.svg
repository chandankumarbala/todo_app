  <!-- Shield boss (center knob) -->
  <circle cx="27" cy="88" r="4" fill="#718096"/>
  <circle cx="27" cy="88" r="2" fill="#94A3B8"/>
  <!-- Lambda Λ -->
  <path d="M22 98 L27 86 L32 98" stroke="#F1F5F9" stroke-width="1.5" fill="none" stroke-linejoin="round"/>

  <!-- ===== LEGS ===== -->
  <!-- Left -->
