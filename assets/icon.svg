  <path d="M48 50 Q60 30 76 28 Q82 27 80 34 Q68 36 58 52" fill="#FF2222"/>
  <path d="M50 49 Q61 33 76 31 Q80 32 78 37 Q67 39 59 51" fill="#FF7777" opacity="0.55"/>

  <!-- ===== TORSO / BREASTPLATE ===== -->
  <path d="M46 64 Q42 74 42 88 L78 88 Q78 74 74 64 Z" fill="#F1F5F9"/>
  <!-- Muscle detail -->
  <path d="M52 72 Q60 68 68 72 Q68 80 60 82 Q52 80 52 72Z" stroke="#CBD5E0" stroke-width="1.2" fill="none"/>
  <line x1="60" y1="68" x2="60" y2="82" stroke="#CBD5E0" stroke-width="1.2"/>

  <!-- Pteryges (armour skirt strips) -->
  <rect x="43" y="87" width="6" height="8" rx="2" fill="#E2E8F0"/>
  <rect x="50.5" y="87" width="6" height="9" rx="2" fill="#F1F5F9"/>
  <rect x="57" y="87" width="6" height="9" rx="2" fill="#E2E8F0"/>
  <rect x="63.5" y="87" width="6" height="9" rx="2" fill="#F1F5F9"/>
  <rect x="70" y="87" width="6" height="8" rx="2" fill="#E2E8F0"/>

  <!-- ===== RIGHT ARM — RAISED, HOLDING SWORD ===== -->
  <!-- Upper arm -->
  <path d="M74 66 Q82 60 86 50 Q88 44 86 40 L82 42 Q83 46 81 52 Q77 60 70 66 Z" fill="#F1F5F9"/>
  <!-- Fist / grip hand -->
  <ellipse cx="86" cy="37" rx="5" ry="6" fill="#E2E8F0"/>

  <!-- SWORD (in hand, pointing up) -->
  <!-- Pommel — at bottom of grip -->
  <ellipse cx="86" cy="41" rx="3.5" ry="2.5" fill="#B8C4CE"/>
  <!-- Handle / grip -->
  <rect x="84.5" y="28.5" width="3" height="12.5" rx="1.5" fill="#718096"/>
